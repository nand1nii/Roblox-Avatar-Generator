<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Editor — Roblox Style</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1a3038;
  --panel: #2a9d90;
  --panel-dark: #1e7a6f;
  --accent: #e9c56a;
  --accent-hover: #d4a843;
  --text: #ffffff;
  --text-dim: #b0d0cc;
  --card-bg: #174048;
  --card-hover: #1d5560;
  --card-selected: #e9c56a;
  --sidebar-bg: #14282e;
  --radius: 8px;
  --font-pixel: 'Press Start 2P', monospace;
}
html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}
.app { display: flex; flex: 1; min-height: 0; }

/* SIDEBAR */
.sidebar {
  width: 200px;
  min-width: 200px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  padding: 16px 8px;
  gap: 4px;
  overflow-y: auto;
}
.sidebar-title {
  font-family: var(--font-pixel);
  font-size: 13px;
  color: var(--accent);
  text-align: center;
  padding: 12px 4px 18px;
  letter-spacing: 1px;
  line-height: 1.5;
}
.cat-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border: none;
  border-radius: var(--radius);
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  cursor: pointer;
  transition: background .15s, color .15s;
  text-align: left;
  white-space: nowrap;
}
.cat-btn:hover { background: rgba(255,255,255,.08); color: var(--text); }
.cat-btn.active { background: var(--panel); color: var(--text); font-weight: 700; }
.cat-btn .icon { font-size: 18px; width: 24px; text-align: center; }

/* CENTER STAGE */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  min-width: 0;
}
.stage-box {
  background: linear-gradient(145deg, #1e4a50, #163238);
  border-radius: 16px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  box-shadow: 0 8px 32px rgba(0,0,0,.35);
  border: 2px solid rgba(255,255,255,.06);
}
.avatar-wrap {
  width: 300px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.avatar-wrap svg { transition: opacity .15s; }
.username-input {
  margin-top: 14px;
  background: rgba(0,0,0,.25);
  border: 2px solid var(--panel);
  border-radius: var(--radius);
  color: var(--text);
  font-family: var(--font-pixel);
  font-size: 11px;
  padding: 8px 14px;
  text-align: center;
  width: 200px;
  outline: none;
}
.username-input:focus { border-color: var(--accent); }

/* RIGHT PANEL */
.picker {
  width: 340px;
  min-width: 340px;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  padding: 16px;
  overflow-y: auto;
}
.picker-title {
  font-family: var(--font-pixel);
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 12px;
  letter-spacing: 1px;
}
.item-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-bottom: 16px;
}
.item-card {
  background: var(--card-bg);
  border: 2px solid transparent;
  border-radius: var(--radius);
  padding: 8px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: border-color .15s, background .15s, transform .1s;
}
.item-card:hover { background: var(--card-hover); transform: translateY(-1px); }
.item-card.selected { border-color: var(--card-selected); background: rgba(233,197,106,.1); }
.item-card .thumb { width: 60px; height: 60px; }
.item-card .label {
  font-size: 10px;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.3;
}
.item-card.selected .label { color: var(--accent); font-weight: 700; }

.color-section { margin-top: 4px; }
.color-section-title {
  font-size: 11px;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.color-row {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: 6px;
  border: 2px solid rgba(255,255,255,.15);
  cursor: pointer;
  transition: border-color .15s, transform .1s;
}
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.active { border-color: var(--accent); border-width: 3px; }
.hex-input {
  width: 80px;
  background: rgba(0,0,0,.3);
  border: 2px solid var(--panel-dark);
  border-radius: 6px;
  color: var(--text);
  font-size: 12px;
  padding: 6px 8px;
  outline: none;
}
.hex-input:focus { border-color: var(--accent); }

/* BOTTOM BAR */
.action-bar {
  display: flex;
  gap: 10px;
  padding: 12px 20px;
  background: var(--sidebar-bg);
  border-top: 1px solid rgba(255,255,255,.06);
  justify-content: center;
  flex-wrap: wrap;
}
.action-btn {
  padding: 10px 20px;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: background .15s, transform .1s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.action-btn:hover { transform: translateY(-1px); }
.action-btn:active { transform: translateY(0); }
.btn-randomize { background: var(--panel); color: var(--text); }
.btn-randomize:hover { background: var(--panel-dark); }
.btn-reset { background: #444; color: var(--text); }
.btn-reset:hover { background: #555; }
.btn-save { background: var(--accent); color: #1a1a1a; }
.btn-save:hover { background: var(--accent-hover); }
.btn-share { background: #5865F2; color: var(--text); }
.btn-share:hover { background: #4752c4; }

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--accent);
  color: #1a1a1a;
  padding: 10px 24px;
  border-radius: 8px;
  font-weight: 700;
  font-size: 13px;
  opacity: 0;
  transition: opacity .2s, transform .2s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE TAB BAR */
.mobile-tabs {
  display: none;
  background: var(--sidebar-bg);
  border-top: 1px solid rgba(255,255,255,.06);
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding: 6px 4px;
  gap: 2px;
}
.mobile-tabs::-webkit-scrollbar { display: none; }
.mob-tab {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 12px;
  border: none;
  border-radius: 8px;
  background: transparent;
  color: var(--text-dim);
  font-size: 9px;
  cursor: pointer;
  white-space: nowrap;
}
.mob-tab .icon { font-size: 18px; }
.mob-tab.active { background: var(--panel); color: var(--text); }

@media (max-width: 900px) {
  .app { flex-direction: column; }
  .sidebar { display: none; }
  .mobile-tabs { display: flex; }
  .stage { padding: 16px 8px; }
  .avatar-wrap { width: 220px; height: 300px; }
  .picker { width: 100%; min-width: 0; max-height: 45vh; }
  .item-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 500px) {
  .item-grid { grid-template-columns: repeat(2, 1fr); }
  .picker { padding: 10px; }
  .stage-box { padding: 14px; }
}
</style>
</head>

// ============================================================
// 2. STATE
// ============================================================

const DEFAULTS = {
  body: 'classic', head: 'standard', face: 'smile', hair: 'messy',
  shirt: 'tee', pants: 'jeans', shoes: 'sneakers', accessory: 'none',
  skinColor: '#ffcba4', hairColor: '#2c1b0e',
  shirtColor: '#e74c3c', pantsColor: '#2c3e50',
};

let state = { ...DEFAULTS };
let activeCategory = 'body';

// ============================================================
// 3. RENDERER — SVG drawing functions
// ============================================================

function getBodyDims(bodyId) {
  const dims = {
    classic:      { tw: 60, th: 80, aw: 14, al: 55, lw: 18, ll: 70, shoulderW: 30 },
    rthro:        { tw: 50, th: 90, aw: 12, al: 60, lw: 16, ll: 80, shoulderW: 25 },
    rthro_narrow: { tw: 44, th: 88, aw: 10, al: 58, lw: 14, ll: 78, shoulderW: 22 },
    blocky:       { tw: 70, th: 74, aw: 18, al: 50, lw: 22, ll: 64, shoulderW: 35 },
    stylish:      { tw: 52, th: 84, aw: 12, al: 56, lw: 16, ll: 74, shoulderW: 26 },
    boy:          { tw: 56, th: 78, aw: 14, al: 52, lw: 18, ll: 68, shoulderW: 28 },
    girl:         { tw: 48, th: 82, aw: 12, al: 54, lw: 16, ll: 72, shoulderW: 24 },
    rthro_tall:   { tw: 48, th: 96, aw: 11, al: 64, lw: 15, ll: 86, shoulderW: 24 },
    rthro_short:  { tw: 56, th: 70, aw: 14, al: 46, lw: 18, ll: 60, shoulderW: 28 },
    custom:       { tw: 54, th: 82, aw: 13, al: 55, lw: 17, ll: 72, shoulderW: 27 },
  };
  return dims[bodyId] || dims.classic;
}

function darken(hex, amt) {
  let c = hex.replace('#','');
  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const n = parseInt(c, 16);
  let r = Math.max(0, (n >> 16) - amt);
  let g = Math.max(0, ((n >> 8) & 0xff) - amt);
  let b = Math.max(0, (n & 0xff) - amt);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function lighten(hex, amt) {
  let c = hex.replace('#','');
  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  const n = parseInt(c, 16);
  let r = Math.min(255, (n >> 16) + amt);
  let g = Math.min(255, ((n >> 8) & 0xff) + amt);
  let b = Math.min(255, (n & 0xff) + amt);
  return '#' + ((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

function drawShoes(svg, s) {
  const d = getBodyDims(s.body);
  const cx = 100, bodyTop = 60;
  const legTop = bodyTop + d.th;
  const footY = legTop + d.ll;
  const gap = 4;
  const lx = cx - gap - d.lw;
  const rx = cx + gap;

  const shoeH = 12, shoeW = d.lw + 8;
  const col = '#444';
  const hi = '#555';

  const shoes = {
    sneakers: () => {
      svg.innerHTML += `<rect x="${lx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="4" fill="${col}"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="4" fill="${col}"/>`;
      svg.innerHTML += `<rect x="${lx-2}" y="${footY+2}" width="${shoeW-4}" height="3" rx="1" fill="${hi}"/>`;
      svg.innerHTML += `<rect x="${rx-2}" y="${footY+2}" width="${shoeW-4}" height="3" rx="1" fill="${hi}"/>`;
    },
    boots: () => {
      const bh = 22;
      svg.innerHTML += `<rect x="${lx-2}" y="${footY-bh+shoeH}" width="${d.lw+4}" height="${bh}" rx="3" fill="#5c3317"/>`;
      svg.innerHTML += `<rect x="${rx-2}" y="${footY-bh+shoeH}" width="${d.lw+4}" height="${bh}" rx="3" fill="#5c3317"/>`;
      svg.innerHTML += `<rect x="${lx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="3" fill="#4a2a10"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="3" fill="#4a2a10"/>`;
    },
    sandals: () => {
      svg.innerHTML += `<rect x="${lx-4}" y="${footY-1}" width="${shoeW}" height="6" rx="2" fill="#c68642"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY-1}" width="${shoeW}" height="6" rx="2" fill="#c68642"/>`;
      svg.innerHTML += `<rect x="${lx-4}" y="${footY+4}" width="${shoeW}" height="6" rx="2" fill="#a06030"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY+4}" width="${shoeW}" height="6" rx="2" fill="#a06030"/>`;
      svg.innerHTML += `<line x1="${lx+d.lw/2}" y1="${footY-4}" x2="${lx}" y2="${footY}" stroke="#a06030" stroke-width="2"/>`;
      svg.innerHTML += `<line x1="${lx+d.lw/2}" y1="${footY-4}" x2="${lx+d.lw}" y2="${footY}" stroke="#a06030" stroke-width="2"/>`;
      svg.innerHTML += `<line x1="${rx+d.lw/2}" y1="${footY-4}" x2="${rx}" y2="${footY}" stroke="#a06030" stroke-width="2"/>`;
      svg.innerHTML += `<line x1="${rx+d.lw/2}" y1="${footY-4}" x2="${rx+d.lw}" y2="${footY}" stroke="#a06030" stroke-width="2"/>`;
    },
    hightops: () => {
      const bh = 18;
      svg.innerHTML += `<rect x="${lx-2}" y="${footY-bh+shoeH}" width="${d.lw+4}" height="${bh}" rx="3" fill="#e74c3c"/>`;
      svg.innerHTML += `<rect x="${rx-2}" y="${footY-bh+shoeH}" width="${d.lw+4}" height="${bh}" rx="3" fill="#e74c3c"/>`;
      svg.innerHTML += `<rect x="${lx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="4" fill="#c0392b"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="4" fill="#c0392b"/>`;
      svg.innerHTML += `<circle cx="${lx+d.lw/2}" cy="${footY-bh+shoeH+5}" r="2.5" fill="white"/>`;
      svg.innerHTML += `<circle cx="${rx+d.lw/2}" cy="${footY-bh+shoeH+5}" r="2.5" fill="white"/>`;
    },
    loafers: () => {
      svg.innerHTML += `<rect x="${lx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="5" fill="#2c1b0e"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="5" fill="#2c1b0e"/>`;
    },
    cleats: () => {
      svg.innerHTML += `<rect x="${lx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="3" fill="#222"/>`;
      svg.innerHTML += `<rect x="${rx-4}" y="${footY}" width="${shoeW}" height="${shoeH}" rx="3" fill="#222"/>`;
      for (let i = 0; i < 3; i++) {
        svg.innerHTML += `<rect x="${lx-2+i*7}" y="${footY+shoeH-2}" width="4" height="4" rx="1" fill="#666"/>`;
        svg.innerHTML += `<rect x="${rx-2+i*7}" y="${footY+shoeH-2}" width="4" height="4" rx="1" fill="#666"/>`;
      }
    },
    moccasins: () => {

function renderAvatar(target, st, w, h) {
  const width = w || 200;
  const height = h || 320;
  const svgNS = 'http://www.w3.org/2000/svg';
  target.innerHTML = '';
  const svg = document.createElementNS(svgNS, 'svg');
  svg.setAttribute('xmlns', svgNS);
  svg.setAttribute('viewBox', '-30 -40 260 400');
  svg.setAttribute('width', width);
  svg.setAttribute('height', height);

  const g = document.createElementNS(svgNS, 'g');
  svg.appendChild(g);

  drawWingsBack(g, st);
  drawCapeBack(g, st);
  drawShoes(g, st);
  drawLegs(g, st);
  drawPants(g, st);
  drawShirt(g, st);
  drawOverallsBib(g, st);
  drawBody(g, st);
  drawNecklace(g, st);
  drawHairBack(g, st);
  drawHead(g, st);
  drawHair(g, st);
  drawFace(g, st);
  drawAccessory(g, st);

  target.appendChild(svg);
  return svg;
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = `<div class="sidebar-title">Avatar<br>Editor</div>`;
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat.id === activeCategory ? ' active' : '');
    btn.innerHTML = `<span class="icon">${cat.icon}</span>${cat.label}`;
    btn.onclick = () => setCategory(cat.id);
    sb.appendChild(btn);
  });
}

function buildMobileTabs() {
  const mt = document.getElementById('mobileTabs');
  mt.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'mob-tab' + (cat.id === activeCategory ? ' active' : '');
    btn.innerHTML = `<span class="icon">${cat.icon}</span>${cat.label}`;
    btn.onclick = () => setCategory(cat.id);
    mt.appendChild(btn);
  });
}

function buildPicker() {
  const pk = document.getElementById('picker');
  const cat = CATEGORIES.find(c => c.id === activeCategory);
  pk.innerHTML = `<div class="picker-title">${cat.icon} ${cat.label.toUpperCase()}</div>`;

  const grid = document.createElement('div');
  grid.className = 'item-grid';

  cat.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card' + (state[cat.id] === item.id ? ' selected' : '');
    const thumbWrap = document.createElement('div');
    thumbWrap.className = 'thumb';
    renderThumb(thumbWrap, cat.id, item.id);
    card.appendChild(thumbWrap);
    const lbl = document.createElement('div');
    lbl.className = 'label';
    lbl.textContent = item.label;
    card.appendChild(lbl);
    card.onclick = () => {
      state[cat.id] = item.id;
      buildPicker();
      renderMain();
    };
    grid.appendChild(card);
  });
  pk.appendChild(grid);

  if (cat.hasColor) {
    buildColorPicker(pk, cat.hasColor);
  }
}

function renderThumb(el, catId, itemId) {
  const thumbState = { ...state };
  thumbState[catId] = itemId;
  renderAvatar(el, thumbState, 60, 60);
  const svg = el.querySelector('svg');
  if (svg) {
    svg.setAttribute('width', 60);
    svg.setAttribute('height', 60);
  }
}

function buildColorPicker(parent, colorType) {
  const section = document.createElement('div');
  section.className = 'color-section';

  const colorMap = {
    skin: { key: 'skinColor', swatches: SKIN_COLORS, label: 'Skin Tone' },
    hair: { key: 'hairColor', swatches: HAIR_COLORS, label: 'Hair Color' },
    shirt: { key: 'shirtColor', swatches: SHIRT_COLORS, label: 'Shirt Color' },
    pants: { key: 'pantsColor', swatches: PANTS_COLORS, label: 'Pants Color' },
  };
  const cfg = colorMap[colorType];
  if (!cfg) return;

  section.innerHTML = `<div class="color-section-title">${cfg.label}</div>`;
  const row = document.createElement('div');
  row.className = 'color-row';

  cfg.swatches.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (state[cfg.key] === c ? ' active' : '');
    sw.style.background = c;
    sw.onclick = () => {
      state[cfg.key] = c;
      buildPicker();
      renderMain();
    };
    row.appendChild(sw);
  });

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'hex-input';
  inp.value = state[cfg.key];
  inp.placeholder = '#hex';
  inp.addEventListener('input', () => {
    const v = inp.value.trim();
    if (/^#[0-9a-fA-F]{3,6}$/.test(v)) {
      state[cfg.key] = v;
      renderMain();
      row.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    }
  });
  row.appendChild(inp);
  section.appendChild(row);
  parent.appendChild(section);
}

function setCategory(catId) {
  activeCategory = catId;
  buildSidebar();
  buildMobileTabs();
  buildPicker();
}

function renderMain() {
  renderAvatar(document.getElementById('avatarWrap'), state);
}

// ============================================================
// 5. CONTROLS
// ============================================================

function randomize() {
  CATEGORIES.forEach(cat => {
    const items = cat.items;
    state[cat.id] = items[Math.floor(Math.random() * items.length)].id;
  });
  state.skinColor = SKIN_COLORS[Math.floor(Math.random() * SKIN_COLORS.length)];
  state.hairColor = HAIR_COLORS[Math.floor(Math.random() * HAIR_COLORS.length)];
  state.shirtColor = SHIRT_COLORS[Math.floor(Math.random() * SHIRT_COLORS.length)];
  state.pantsColor = PANTS_COLORS[Math.floor(Math.random() * PANTS_COLORS.length)];
  buildPicker();
  renderMain();
}

function resetAvatar() {
  Object.assign(state, DEFAULTS);
  buildPicker();
  renderMain();
}

function savePNG() {
  const wrap = document.createElement('div');
  const svg = renderAvatar(wrap, state, 400, 640);

  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(svg);
  const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = 400;
    canvas.height = 640;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#1a3038';
    ctx.fillRect(0, 0, 400, 640);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);

    canvas.toBlob(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'avatar.png';
      a.click();
      URL.revokeObjectURL(a.href);
    }, 'image/png');
  };
  img.src = url;

  showToast('Avatar saved!');
}

function shareLink() {
  const params = new URLSearchParams();
  for (const key in state) {
    if (state[key] !== DEFAULTS[key]) {
      params.set(key, state[key]);
    }
  }
  const username = document.getElementById('usernameInput').value;
  if (username && username !== 'Player1') params.set('name', username);

  const url = window.location.origin + window.location.pathname + '?' + params.toString();
  navigator.clipboard.writeText(url).then(() => {
    showToast('Link copied to clipboard!');
  }).catch(() => {
    showToast('Link: ' + url);
  });
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function loadFromURL() {
  const params = new URLSearchParams(window.location.search);
  if (params.toString()) {
    CATEGORIES.forEach(cat => {
      const v = params.get(cat.id);
      if (v && cat.items.some(i => i.id === v)) state[cat.id] = v;
    });
    ['skinColor','hairColor','shirtColor','pantsColor'].forEach(k => {
      const v = params.get(k);
      if (v && /^#[0-9a-fA-F]{3,6}$/.test(v)) state[k] = v;
    });
    const name = params.get('name');
    if (name) {
      document.getElementById('usernameInput').value = name.slice(0, 20);
    }
  }
}

// ============================================================
// INIT
// ============================================================

loadFromURL();
buildSidebar();
buildMobileTabs();
buildPicker();
renderMain();
</script>
</body>
